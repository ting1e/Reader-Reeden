
{% extends "base.html" %}

{% block title %}Reader{% endblock %}

{% block content %}

<main>
  {% include 'header.html' %}

  <div class="container mx-auto px-4">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
      {% load static %}
      {% for book in book_list %}
      <div>
        <form method="POST" action="{% url 'reader:book_view' %}">
          {% csrf_token %}
          <input type="hidden" name="book_id" value="{{ book.id }}">
          <button class="card card-compact bg-base-100 shadow-sm hover:shadow-md transition-shadow duration-150 w-full border-0 text-left cursor-pointer" type="submit">
           <img src="{% static 'images/book.png' %}" alt="{{ book.name }}">
            <div class="card-body p-2">
              <div class="text-base-content/80 break-words overflow-hidden book-tittle text-sm">
                {{ book.name }}
              </div>
            </div>
          </button>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>

</main>
{% endblock %}

{% block body-bottom %}

{% endblock %}

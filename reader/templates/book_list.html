
{% extends "base.html" %}

{% block title %}Reader{% endblock %}

{% block content %}

<main>
  {% include 'header.html' %}

  <div class="container mx-auto px-4 py-4">

    <div class="flex items-center gap-2 mb-8 sort-bar">
      <span class="text-sm text-base-content/60">排序：</span>
      <div class="join">
        <button class="btn btn-sm join-item sort-btn" data-sort="name">名称</button>
        <button class="btn btn-sm join-item sort-btn" data-sort="time">时间</button>
        <button class="btn btn-sm join-item sort-btn" data-sort="progress">进度</button>
        <button class="btn btn-sm join-item sort-btn" data-sort="recent">最近阅读</button>
        <button class="btn btn-sm join-item sort-btn" data-sort="size">大小</button>
      </div>
    </div>

   <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-5 book-grid">
      {% for book in book_list %}
      <div class="book-item"
           data-book-name="{% if book.file_name %}{{ book.file_name }}{% else %}{{ book.name }}{% endif %}"
           data-sort-name="{% if book.file_name %}{{ book.file_name }}{% else %}{{ book.name }}{% endif %}"
           data-sort-time="{{ book.upload_time|date:"U" }}"
           data-sort-progress="{{ book.progress_value }}"
           data-sort-recent="{% if book.read_time %}{{ book.read_time|date:"U" }}{% else %}0{% endif %}"
           data-sort-size="{{ book.file_size }}">
        <form method="POST" action="{% url 'reader:book_view' %}">
          {% csrf_token %}
          <input type="hidden" name="book_id" value="{{ book.id }}">
          <button class="card card-compact bg-base-100 shadow-sm hover:shadow-md transition-shadow duration-150 w-full border-0 text-left cursor-pointer" type="submit">
            <figure class="relative aspect-[3/4] bg-base-200 border border-base-300 rounded-r-md rounded-l-sm flex items-center justify-center p-3 overflow-hidden">
              <div class="absolute left-2.5 top-0 bottom-0 w-px bg-base-300 shadow-[1px_0_1px_rgba(0,0,0,0.05)]"></div>
              
              <span class="text-sm sm:text-base font-bold text-center text-base-content/70 line-clamp-4 z-10 pl-2">
                {% if book.file_name %}{{ book.file_name }}{% else %}{{ book.name }}{% endif %}
              </span>

              {% if book.file_size_display %}
              <span class="absolute bottom-1 left-0 right-0 text-center text-[15px] text-base-content/30 z-10">{{ book.file_size_display }}</span>
              {% endif %}

              <div class="absolute bottom-0 left-0 h-1 bg-primary/60" style="width: {{ book.progress_value }}%;"></div>
            </figure>
          </button>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>

</main>

{% endblock %}

{% block body-bottom %}
<script>
(function() {
    var defaultDir = {name: 'asc', time: 'desc', progress: 'desc', recent: 'desc', size: 'desc'};
    var STORAGE_KEY = 'book_list_sort';
    var currentSort = null;
    var currentDir = null;

    function saveSortState() {
        if (currentSort) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({sort: currentSort, dir: currentDir}));
        }
    }

    function loadSortState() {
        try {
            var s = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (s && s.sort && defaultDir[s.sort] !== undefined) {
                return s;
            }
        } catch (e) {}
        return null;
    }

    function applySort(sortKey, dir) {
        if (arguments.length >= 2) {
            currentSort = sortKey;
            currentDir = dir;
        } else if (currentSort === sortKey) {
            currentDir = currentDir === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort = sortKey;
            currentDir = defaultDir[sortKey] || 'asc';
        }
        var $grid = $('.book-grid');
        var $items = $grid.children('.book-item').get();
        $items.sort(function(a, b) {
            var av = $(a).data('sort-' + currentSort);
            var bv = $(b).data('sort-' + currentSort);
            if (currentSort === 'name') {
                return currentDir === 'asc'
                    ? String(av).localeCompare(String(bv))
                    : String(bv).localeCompare(String(av));
            }
            av = parseFloat(av) || 0;
            bv = parseFloat(bv) || 0;
            return currentDir === 'asc' ? av - bv : bv - av;
        });
        $.each($items, function(i, el) { $grid.append(el); });

        $('.sort-btn').each(function() {
            var active = $(this).data('sort') === currentSort;
            $(this).toggleClass('btn-active', active);
            var label = $(this).text().replace(/[▲▼]\s*$/, '').trim();
            $(this).text(label);
            if (active) {
                $(this).text(label + (currentDir === 'asc' ? ' ▲' : ' ▼'));
            }
        });
        saveSortState();
    }

    $('.sort-btn').click(function() {
        applySort($(this).data('sort'));
    });

    var saved = loadSortState();
    if (saved) {
        applySort(saved.sort, saved.dir);
    }
})();
</script>
{% endblock %}

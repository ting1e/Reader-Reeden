<!DOCTYPE html>
<html data-theme="{{ daisyui_theme|default:'light' }}">
<head>
    <title>{% block title %}My amazing site{% endblock %}</title>
    {% load static %}

    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <link rel="icon" href="{% static 'favicon.ico' %}">
    {% if not request.user.is_authenticated %}
    <script>
      (function(){
        var t = localStorage.getItem('daisyui_theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    {% endif %}

    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">
    <script src="{% static 'jquery-3.6.0.min.js' %}"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>

    {% block header %}{% endblock %}
</head>

<body>

    {% block content %}{% endblock %}

    {% block body-bottom %}{% endblock %}

</body>

</html>

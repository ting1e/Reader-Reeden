
{% extends "base.html" %}

{% block title %} Reader {% endblock %}

{% block content %}
<style>

{% if user_setting %}
main{
    background:{{user_setting.read_bg}};
}

article{
    font-size:{{user_setting.font_size}}px;
}
    {% if 'rgb(0, 0, 0)' in user_setting.read_bg %}
    main{
        color:rgb(90, 90, 90);
    }
    {% elif 'rgb(195, 212, 230)' in user_setting.read_bg %}
    main{
        color:#1f3a5a;
    }
    {% elif 'rgb(200, 232, 200)' in user_setting.read_bg %}
    main{
        color:#1f3a1f;
    }
    {% elif 'rgb(196, 179, 149)' in user_setting.read_bg %}
    main{
        color:#3a2a1a;
    }
    {% endif %}
{% endif %}

</style>

<div class="drawer">
  <input id="drawer-left" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content">
    <main class="min-h-screen">

        {% include 'header.html' %}

        <div class="container mx-auto px-4">
            <div class="article-container">
                {{chapter_view|safe}}
            </div>

            <div class="page-nav py-3">
                <nav aria-label="Page navigation">
                    <div class="join flex justify-between w-full">
                        <div class="flex gap-0">
                            <button class="btn btn-outline btn-sm join-item prev-chapter" type="button">上一章</button>
                            <button class="btn btn-outline btn-sm join-item page-item prev-page" type="button">上一页</button>
                        </div>

                        <div class="pages-container join justify-center flex">

                        </div>

                        <div class="flex gap-0">
                            <button class="btn btn-outline btn-sm join-item page-item next-page" type="button">下一页</button>
                            <button class="btn btn-outline btn-sm join-item next-chapter" type="button">下一章</button>
                        </div>
                    </div>
                </nav>
            </div>

        </div>

        <!-- Settings Toast -->
        <div id="offcanvassetting" class="toast toast-top toast-end mt-16" style="display:none; z-index: 1080;">
            <div class="alert shadow-lg bg-base-100 border border-base-300 p-6 relative" style="min-width: 340px;">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 setting-close" type="button">✕</button>
                <div class="flex flex-col gap-4 w-full">
                    <h3 class="text-base font-bold text-center">阅读设置</h3>
                    <div class="divider my-0 h-0"></div>

                    <div class="flex items-center justify-center gap-3">
                        <button class="btn btn-outline dec-font update-setting" type="button">A-</button>
                        <span class="font-value text-center w-16 font-semibold text-lg"> </span>
                        <button class="btn btn-outline inc-font update-setting" type="button">A+</button>
                    </div>

                    <div class="divider my-0 h-0"></div>

                    <ul class="flex justify-center gap-3" style="height: 48px;">
                        <li class="w-10 h-10 rounded-lg border-2 cursor-pointer bg-setting read-white update-setting" style="background: #fff;"></li>
                        <li class="w-10 h-10 rounded-lg border-2 cursor-pointer bg-setting read-blue update-setting" style="background: #c3d4e6;"></li>
                        <li class="w-10 h-10 rounded-lg border-2 cursor-pointer bg-setting read-green update-setting" style="background: #c8e8c8;"></li>
                        <li class="w-10 h-10 rounded-lg border-2 cursor-pointer bg-setting read-yellow update-setting" style="background: #c4b395"></li>
                        <li class="w-10 h-10 rounded-lg border-2 cursor-pointer bg-setting read-black update-setting" style="background: #000"></li>
                    </ul>

                    <div class="divider my-0 h-0"></div>

                    <div class="flex items-center justify-center gap-3">
                        <span class="text-sm text-base-content/70">阅读方式</span>
                        <div class="join">
                            <button class="btn btn-sm join-item mode-setting mode-page" type="button" data-mode="page">翻页</button>
                            <button class="btn btn-sm join-item mode-setting mode-slide" type="button" data-mode="slide">滑动</button>
                        </div>
                    </div>

                    <div class="divider my-0 h-0"></div>

                    <div class="flex items-center justify-center gap-3 flex-wrap">
                        <span class="text-sm text-base-content/70">自动阅读</span>
                        <input type="checkbox" class="toggle toggle-sm" id="auto-read-toggle">
                        <span class="text-sm text-base-content/70">速度</span>
                        <input type="range" min="0.1" max="5" step="0.1" value="2" class="range range-xs w-28 [--range-fill:0]" id="auto-read-speed">
                        <span class="text-xs w-8 text-center" id="auto-read-speed-val">2</span>
                    </div>

                    <div class="divider my-0 h-0"></div>
                </div>
            </div>
        </div>

        <!-- Floating action buttons -->
        <div style="right: 20px; bottom: 20px; position: fixed; z-index: 50;">
            <ul class="flex flex-col gap-2">
                <li>
                    <label for="drawer-left" class="btn btn-square btn-sm bg-base-100 border border-base-300 shadow-md hover:bg-base-200 chapter_list_btn" aria-label="目录">
                        <i class="bi bi-list text-lg"></i>
                    </label>
                </li>
                <li>
                    <a href="#" class="btn btn-square btn-sm bg-base-100 border border-base-300 shadow-md hover:bg-base-200 bookmark-btn" aria-label="书签">
                        <i class="bi bi-bookmark-star text-lg"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="btn btn-square btn-sm bg-base-100 border border-base-300 shadow-md hover:bg-base-200 setting-btn" aria-label="设置">
                        <i class="bi bi-gear text-lg"></i>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Search Modal -->
        <dialog class="modal myModal">
            <div class="modal-box max-w-5xl">
                <form method="dialog">
                    <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
                </form>
                <div class="flex items-center gap-3 mb-4">
                    <h3 class="text-xl font-bold shrink-0 search-modal-title">全文搜索</h3>
                    <form role="search" onsubmit="return false;" class="w-1/2">
                        <input type="search" class="input input-bordered input-lg w-full content-serarch" placeholder="搜索..." aria-label="Search">
                    </form>
                </div>
                <div class="search-res max-h-[60vh] overflow-y-auto">
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>

        <!-- Settings Modal (unused, kept for compatibility) -->
        <dialog class="modal setting_modal">
            <div class="modal-box">
                <form method="dialog">
                    <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
                </form>
                <h3 class="text-lg font-bold">设置</h3>
                <div class="py-4">
                    <p>Modal body text goes here.</p>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>
    </main>
  </div>

  <!-- Drawer side panel (formerly offcanvas) -->
  <div class="drawer-side z-40" id="drawer-side" style="pointer-events: none;">
    <label aria-label="关闭侧栏" class="drawer-overlay" style="background: transparent; pointer-events: none;"></label>
    
    <div class="flex flex-col w-80 h-screen bg-base-100 text-base-content rounded-r-2xl shadow-2xl border-r border-base-200 relative" style="pointer-events: auto;">        
        <label for="drawer-left" class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 z-10" aria-label="关闭侧栏">✕</label>
        <div class="p-4 pb-0 shrink-0">
            <div role="tablist" class="tabs tabs-border">
                <a role="tab" class="tab flex-1 tab-active chapter-list-show" data-tab="chapters">目录</a>
                <a role="tab" class="tab flex-1 bookmark-show" data-tab="bookmarks">书签</a>
            </div>
        </div>

        <div id="chapter-scroll-container" class="flex-1 overflow-y-auto min-h-0 mt-2 p-4 custom-scrollbar">
            
            <div id="tab-chapters">
                <div class="chapter_list_container"></div>  

            </div>
            
            <div id="tab-bookmarks" class="hidden">
                <div class="bookmark_list_container"></div>
            </div>
            
        </div>
    </div>
</div>
</div>

{% endblock %}

{% block body-bottom %}

{% load static %}

<script>
    var csrf_token = '{{ csrf_token }}'
    var last_words = parseInt({{last_words}})
    var user_setting_bg = "{{user_setting.read_bg}}"
    var user_setting_mode = "{{user_setting.read_mode|default:'page'}}"
    var url_update_setting = "{% url 'reader:update_setting' %}"
    var url_bookmark_save = "{% url 'reader:bookmark_save' %}"
    var book_id = '{{book_id}}'
    var chapter_id = parseInt('{{chapter_id}}')
    var chapter_title = '{{chapter_title}}'

    var url_book_reader = "{% url 'reader:book_view' %}";
    var url_chapter_content = "{% url 'reader:chapter_content' 0 %}";
    var url_chapter_list_ajax = "{% url 'reader:chapter_list_ajax' book_id %}";
    var chapter_ids = [{% for cid in chapter_ids %}{{cid}}{% if not forloop.last %},{% endif %}{% endfor %}];

    var url_bookmark_list = "{% url 'reader:null'  %}"
    {% if request.user.id %}
    var url_bookmark_list = "{% url 'reader:bookmark_list' request.user.id  book_id %}"
    {% endif %}
    </script>

    <script src="{% static 'reader.js' %}"></script>


    {% endblock %}

{% extends "base.html" %}

{% block title %}上传书籍{% endblock %}

{% block content %}

<main>
  {% include 'header.html' %}

  <div class="container mx-auto px-4 py-4 max-w-4xl">
    <h2 class="text-2xl font-bold mb-2">上传书籍</h2>
    <p class="text-sm text-base-content/60 mb-6">仅支持 .txt 文本文件，单文件最大 100MB。支持多选、拖拽到下方区域或 Ctrl+V 粘贴。</p>

    <div class="card bg-base-100 shadow-sm border border-base-200">
      <div class="card-body p-4 sm:p-6">
        <!-- 拖拽上传区 -->
        <div id="upload-dropzone" class="dropzone group">
          <div class="dz-message" data-dz-message>
            <div class="flex flex-col items-center gap-2 pointer-events-none">
              <iconify-icon icon="bi:cloud-arrow-up" class="text-4xl text-base-content/40 group-hover:text-primary transition-colors"></iconify-icon>
              <span class="text-base font-medium">点击选择 / 拖拽到此 / Ctrl+V 粘贴</span>
              <span class="text-xs text-base-content/60">可批量上传并自动分章保存</span>
            </div>
          </div>
        </div>
        
        <!-- 独立的文件预览列表区 -->
        <div id="upload-previews" class="mt-4 empty:hidden flex flex-col gap-2"></div>
        
        <!-- 汇总提示 -->
        <div id="upload-summary" class="mt-4 hidden"></div>
      </div>
    </div>

    <div class="mt-6 flex justify-end">
      <a href="{% url 'reader:book_admin' %}" class="btn btn-outline btn-sm">
        <iconify-icon icon="bi:journal-text"></iconify-icon> 返回书籍管理
      </a>
    </div>
  </div>

</main>

{% endblock %}

{% block body-bottom %}

{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dropzone@5/dist/dropzone.min.css">
<script src="https://cdn.jsdelivr.net/npm/dropzone@5/dist/dropzone.min.js"></script>

<style>
/* 极简覆盖 Dropzone 样式 */
.dropzone {
  border: 2px dashed var(--fallback-bc, oklch(var(--bc)/0.2));
  background: transparent;
  border-radius: 0.75rem;
  min-height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  cursor: pointer;
}
.dropzone:hover, .dropzone.dz-drag-hover {
  border-color: var(--fallback-p, oklch(var(--p)/1));
  background-color: var(--fallback-p, oklch(var(--p)/0.05));
}
/* 取消内部元素的指针事件，防止拖拽闪烁 */
.dropzone * {
  pointer-events: none;
}
</style>

<!-- daisyUI 风格预览模板 -->
<template id="upload-preview-template">
  <div class="upload-item flex items-center gap-3 w-full px-4 py-3 rounded-lg border border-base-200 bg-base-50/50">
    <iconify-icon icon="bi:file-earmark-text" class="text-2xl text-base-content/50 shrink-0"></iconify-icon>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-1">
        <span class="dz-filename text-sm font-medium truncate" data-dz-name></span>
        <span class="dz-size text-xs text-base-content/50 shrink-0" data-dz-size></span>
      </div>
      <progress class="dz-progress progress progress-primary w-full h-1.5" value="0" max="100"></progress>
    </div>
    <span class="dz-status badge badge-sm shrink-0">等待</span>
    <button type="button" class="dz-remove btn btn-ghost btn-xs btn-circle shrink-0 pointer-events-auto" data-dz-remove aria-label="移除">
      <iconify-icon icon="bi:x" class="text-lg"></iconify-icon>
    </button>
  </div>
</template>

<script>
(function() {
  Dropzone.autoDiscover = false;

  var summaryEl = document.getElementById('upload-summary');
  var successCount = 0;
  var errorCount = 0;

  function updateSummary() {
    if (successCount + errorCount === 0) {
      summaryEl.classList.add('hidden');
      return;
    }
    summaryEl.classList.remove('hidden');
    var fail = errorCount;
    var cls = fail > 0 ? 'alert-warning' : 'alert-success';
    var icon = fail > 0 ? 'bi:exclamation-triangle' : 'bi:check-circle';
    
    summaryEl.innerHTML = `
      <div class="alert ${cls} py-3 px-4 text-sm flex items-center gap-2 shadow-sm rounded-lg">
        <iconify-icon icon="${icon}" class="text-xl"></iconify-icon>
        <span>上传完成：成功 ${successCount} 本${fail > 0 ? '，失败 ' + fail + ' 本' : ''}</span>
      </div>
    `;
  }

  var dz = new Dropzone('#upload-dropzone', {
    url: "{% url 'reader:upload_file' %}",
    method: 'post',
    paramName: 'file',
    acceptedFiles: '.txt',
    maxFilesize: 100,               
    parallelUploads: 1,             
    autoProcessQueue: true,
    uploadMultiple: false,          
    createImageThumbnails: false,
    addRemoveLinks: false,
    previewsContainer: '#upload-previews', // 将预览独立挂载
    previewTemplate: document.getElementById('upload-preview-template').innerHTML,
    clickable: true,
    headers: { 'X-CSRFToken': '{{ csrf_token }}' },
    dictFileTooBig: '文件超过 100MB 限制',
    dictInvalidFileType: '仅支持 .txt 文件',
    
    init: function() {
      this.on('addedfile', function(file) {
        var status = file.previewElement.querySelector('.dz-status');
        if (status) status.textContent = '等待';
      });
      
      this.on('sending', function(file) {
        var status = file.previewElement.querySelector('.dz-status');
        if (status) { 
          status.textContent = '上传中'; 
          status.className = 'dz-status badge badge-sm badge-ghost shrink-0'; 
        }
      });
      
      this.on('uploadprogress', function(file, progress) {
        var bar = file.previewElement.querySelector('.dz-progress');
        if (bar) bar.value = progress;
      });
      
      this.on('success', function(file, resp) {
        successCount++;
        var status = file.previewElement.querySelector('.dz-status');
        if (status) { 
          status.textContent = '成功'; 
          status.className = 'dz-status badge badge-sm badge-success shrink-0'; 
        }
        var bar = file.previewElement.querySelector('.dz-progress');
        if (bar) { 
          bar.value = 100; 
          bar.className = 'dz-progress progress progress-success w-full h-1.5'; 
        }
        updateSummary();
      });
      
      this.on('error', function(file, errMsg) {
        errorCount++;
        var msg = (typeof errMsg === 'string' ? errMsg : (errMsg && errMsg.error) || '上传失败');
        var status = file.previewElement.querySelector('.dz-status');
        if (status) { 
          status.textContent = '失败'; 
          status.className = 'dz-status badge badge-sm badge-error shrink-0'; 
          status.title = msg; 
        }
        var bar = file.previewElement.querySelector('.dz-progress');
        if (bar) { 
          bar.value = 0; 
          bar.className = 'dz-progress progress progress-error w-full h-1.5'; 
        }
        updateSummary();
      });
    }
  });
})();
</script>

{% endblock %}

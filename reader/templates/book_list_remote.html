{% extends "base.html" %}

{% block title %}Reader{% endblock %}

{% block content %}

<main>
  {% include 'header.html' %}

  <div class="container mx-auto px-4 py-4">
    {% if s3_error %}
    <div class="alert alert-error shadow-lg mb-4">
      <div>
        <iconify-icon icon="bi:exclamation-triangle-fill" class="text-xl"></iconify-icon>
        <span>{{ s3_error }}</span>
      </div>
    </div>
    {% endif %}

    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-5">
      {% for book in book_list_remote %}
      <div class="book-item" data-book-name="{{ book.name }}">
        <form method="POST" action="{% url 'reader:open_remote_book' %}" class="block">
          {% csrf_token %}
          <input type="hidden" name="name" value="{{ book.name }}">
          <button type="submit" class="block w-full text-left cursor-pointer p-0 border-0 bg-transparent card card-compact bg-base-100 shadow-sm hover:shadow-md transition-shadow duration-150">
            <figure class="relative aspect-[3/4] bg-base-200 border border-base-300 rounded-r-md rounded-l-sm flex items-center justify-center p-3 overflow-hidden">
              <div class="absolute left-2.5 top-0 bottom-0 w-px bg-base-300 shadow-[1px_0_1px_rgba(0,0,0,0.05)]"></div>
              
              {% if not book.in_db %}
              <div class="absolute top-1 right-1 z-10">
                <iconify-icon icon="bi:cloud" class="text-base-content/40 text-lg leading-none"></iconify-icon>
              </div>
              {% endif %}

              <span class="text-sm sm:text-base font-bold text-center text-base-content/70 line-clamp-4 z-10 pl-2">
                {{ book.name }}
              </span>

              {% if book.progress > 0 %}
              <div class="absolute bottom-0 left-0 h-1 bg-primary/60 z-10" style="width: {{ book.progress }}%;"></div>
              {% endif %}
            </figure>
          </button>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>

</main>
{% endblock %}

{% block body-bottom %}

{% endblock %}
